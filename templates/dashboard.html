<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ride Dispatch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f0f0; max-width: 480px; margin: 0 auto;
  }
  .header {
    position: sticky; top: 0; z-index: 10;
    background: #fff; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #e0e0e0;
  }
  .date-nav { display: flex; gap: 12px; align-items: center; }
  .date-nav button {
    background: none; border: 1px solid #ccc; border-radius: 8px;
    padding: 6px 14px; font-size: 16px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn {
    background: none; border: 1px solid #ccc; border-radius: 8px;
    padding: 6px 12px; font-size: 18px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .date { font-size: 17px; font-weight: 600; min-width: 120px; text-align: center; }
  .revenue {
    font-size: 28px; font-weight: 700; text-align: center;
    padding: 20px 16px 12px; color: #1a1a1a;
  }
  .revenue small { font-size: 14px; font-weight: 400; color: #888; display: block; margin-bottom: 4px; }
  .orders { padding: 0 12px 24px; }
  a.card {
    display: block; text-decoration: none; color: inherit;
    background: #fff; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    -webkit-tap-highlight-color: rgba(0,0,0,.05);
  }
  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .badge {
    font-size: 13px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; display: inline-block;
  }
  .badge.pickup { background: #e8f4fd; color: #0a84ff; }
  .badge.dropoff { background: #fff3e0; color: #f57c00; }
  .badge.didi { background: #e8f5e9; color: #43a047; }
  .badge.uber { background: #f3e5f5; color: #8e24aa; }
  .badge.banner { background: #fff8e1; color: #f9a825; margin-left: 4px; }
  .time { font-size: 15px; font-weight: 600; color: #333; }
  .passenger { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .flight { font-size: 13px; color: #888; margin-bottom: 8px; }
  .route { font-size: 13px; color: #555; line-height: 1.5; }
  .route .arrow { color: #aaa; }
  .price { font-size: 15px; font-weight: 600; margin-top: 8px; color: #1a1a1a; }
  .price.none { color: #ccc; font-weight: 400; }
  .empty { text-align: center; color: #999; padding: 60px 0; font-size: 15px; }
  .count { font-size: 13px; color: #888; text-align: center; padding-bottom: 8px; }
  .est { font-size: 13px; color: #0a84ff; margin-top: 2px; }
  .est.landed { color: #43a047; }
</style>
</head>
<body>
<div class="header">
  <div class="date-nav">
    <button onclick="go(-1)">&larr;</button>
    <span class="date" id="date"></span>
    <button onclick="go(1)">&rarr;</button>
  </div>
  <button class="refresh-btn" onclick="load()">&circlearrowright;</button>
</div>
<div class="revenue" id="revenue"></div>
<div class="count" id="count"></div>
<div class="orders" id="orders"></div>
<script>
function fmt(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

let cur = fmt(new Date());

function go(d) {
  const dt = new Date(cur + 'T00:00:00');
  dt.setDate(dt.getDate() + d);
  cur = fmt(dt);
  load();
}

async function load() {
  document.getElementById('date').textContent = cur;
  const res = await fetch('/api/orders?date=' + cur);
  const data = await res.json();
  const orders = data.orders;

  let total = 0, costs = 0, priced = 0;
  orders.forEach(o => {
    if (o.price) { total += o.price + (o.banner_fee || 0); priced++; }
    costs += (o.tunnel_fee || 0) + (o.parking_fee || 0);
  });
  const net = total - costs;

  document.getElementById('revenue').innerHTML =
    '<small>總收入</small>$' + $(total) +
    (costs ? '<small style="margin-top:6px">淨收入</small>$' + $(net) : '');
  document.getElementById('count').textContent =
    orders.length ? orders.length + ' 單' + (priced < orders.length ? ' · ' + (orders.length - priced) + ' 單未入價' : '') : '';

  if (!orders.length) {
    document.getElementById('orders').innerHTML = '<div class="empty">冇訂單</div>';
    return;
  }

  document.getElementById('orders').innerHTML = orders.map(o => {
    const isDidi = o.service_type === '滴滴';
    const isUber = o.service_type === 'Uber';
    const isPickup = o.service_type === '接机';
    const badge = isDidi ? 'didi' : isUber ? 'uber' : isPickup ? 'pickup' : 'dropoff';
    const label = isDidi ? '滴滴' : isUber ? 'Uber' : isPickup ? '接機' : '送機';
    const t = (o.scheduled_time || '').split(' ')[1];
    const time = t ? t.slice(0, 5) : '';
    const costTotal = (o.tunnel_fee || 0) + (o.parking_fee || 0);
    const banner = o.banner_fee || 0;
    let priceDetail = '';
    if (o.price) {
      const gross = o.price + banner;
      priceDetail = '<div class="price">$' + $(o.price);
      if (banner) priceDetail += ' + $' + $(banner);
      if (costTotal) priceDetail += ' <span style="font-weight:400;color:#888;font-size:13px">- $' + $(costTotal) + ' = $' + $(gross - costTotal) + '</span>';
      priceDetail += '</div>';
    } else {
      priceDetail = '<div class="price none">未入價</div>';
    }
    let priceHtml = priceDetail;
    const tgLink = 'https://t.me/agent_ride_bot?start=order_' + encodeURIComponent(o.order_id);
    let estHtml = '';
    if (isPickup && o.estimated_landing) {
      const isLanded = o.estimated_landing.startsWith('Landed') || o.estimated_landing.startsWith('At gate');
      const cls = isLanded ? 'est landed' : 'est';
      if (isLanded) {
        estHtml = '<div class="' + cls + '">' + esc(o.estimated_landing) + '</div>';
      } else {
        const estMatch = o.estimated_landing.match(/(\d{2}:\d{2})/);
        if (estMatch && estMatch[1] !== time) {
          estHtml = '<div class="' + cls + '">' + time + ' &rarr; ' + estMatch[1] + '</div>';
        }
      }
    }
    return '<a href="' + tgLink + '" class="card">' +
      '<div class="card-top"><div><span class="badge ' + badge + '">' + label + '</span>' + (banner ? '<span class="badge banner">舉牌</span>' : '') + '</div><span class="time">' + time + '</span></div>' +
      (o.passenger_name ? '<div class="passenger">' + esc(o.passenger_name) + '</div>' : '') +
      (o.flight_number || o.vehicle_type ? '<div class="flight">' + esc(o.flight_number || '') + (o.vehicle_type ? ' · ' + esc(o.vehicle_type) : '') + '</div>' : '') +
      estHtml +
      (o.pickup ? '<div class="route">' + esc(o.pickup) + '<br><span class="arrow">&rarr;</span> ' + esc(o.dropoff) + '</div>' : '') +
      priceHtml +
      '</a>';
  }).join('');
}

function $(n) { return n % 1 ? n.toFixed(2) : n.toFixed(0); }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

load();

const es = new EventSource('/api/events');
es.onmessage = () => load();
</script>
</body>
</html>
